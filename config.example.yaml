# AWS 基础配置
aws:
  region: us-east-1              # AWS Region（必须与 Kiro 和 QuickSight 在同一 Region）
  account_id: "YOUR_ACCOUNT_ID"  # 12 位 AWS 账户 ID

# S3 数据源配置
s3:
  bucket_name: "your-kiro-reports-bucket"  # Kiro User Activity Report 投递的 S3 桶名
  prefix: "amazon-q-developer/"            # S3 前缀（通常不需要修改）

# Glue 配置（通常不需要修改）
glue:
  database_name: "kiro_analytics"

# IAM Identity Center 配置
identity_center:
  identity_store_id: "d-xxxxxxxxxx"  # Identity Store ID
    # 获取方式: AWS Console → IAM Identity Center → Settings
    # 或: aws sso-admin list-instances --query 'Instances[0].IdentityStoreId'

# QuickSight 配置
quicksight:
  user_arn: "arn:aws:quicksight:us-east-1:YOUR_ACCOUNT_ID:user/default/YOUR_ROLE/YOUR_USERNAME"
    # QuickSight 用户 ARN
    # 获取方式: aws quicksight list-users --aws-account-id YOUR_ACCOUNT_ID --namespace default
  data_source_name: "KiroUserActivity"
  dataset_name: "KiroUserActivityDataset"
  dashboard_id: "kiro-comprehensive-dashboard"

# Dashboard 报告配置
report:
  email: "your-email@example.com"        # 报告接收邮箱（需通过 SES 验证）
  schedule: "cron(0 5 * * ? *)"          # 每天 UTC 05:00 (北京 13:00)，在 SPICE 刷新后
  bucket: "your-report-bucket"           # 报告输出桶（建议与数据桶分开，避免公开策略影响原始数据）
